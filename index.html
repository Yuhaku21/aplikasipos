<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0F6B4C">
<link rel="icon" href="icons/logotrazivo.png">

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

#kasir-app {
  --paper: #FAF7F0;
  --panel: #FFFFFF;
  --ink: #20281F;
  --ink-soft: #5B6459;
  --primary: #0F6B4C;
  --primary-dark: #0A4E38;
  --primary-soft: #E4F1EA;
  --amber: #C97A1A;
  --amber-soft: #FBEEDD;
  --blue: #2A5C8A;
  --blue-soft: #E7EFF6;
  --danger: #B84136;
  --danger-soft: #FAEAE8;
  --border: #E6E0D2;
  --border-strong: #D3CBB8;
  --nav-h: 62px;
  --shadow: 0 1px 2px rgba(32,40,31,0.06), 0 4px 16px rgba(32,40,31,0.05);

  font-family: 'Inter', sans-serif;
  color: var(--ink);
  background: var(--paper);
  width: 100%;
  height: 100%;
  min-height: 640px;
  display: flex;
  flex-direction: column;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-sizing: border-box;
  position: relative;
}
#kasir-app *, #kasir-app *::before, #kasir-app *::after { box-sizing: border-box; }
#kasir-app .num { font-family: 'IBM Plex Mono', monospace; }
#kasir-app .display { font-family: 'Space Grotesk', sans-serif; }
#kasir-app button { font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; }
#printArea { display: none; }

/* ---------- Topbar ---------- */
#kasir-app .topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; border-bottom: 1px solid var(--border);
  background: var(--paper); flex: none; gap: 10px;
}
#kasir-app .topbar-left { display: flex; align-items: center; gap: 9px; min-width: 0; }
#kasir-app .brand-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); flex-shrink: 0; }
#kasir-app .topbar h1 { font-family: 'Space Grotesk'; font-size: 17px; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#kasir-app .topbar .sub { font-size: 11px; color: var(--ink-soft); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#kasir-app .clock { font-size: 11px; color: var(--ink-soft); text-align: right; display: none; }
#kasir-app .btn-install {
  display: flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 999px;
  background: var(--primary); color: #fff; border: none; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
#kasir-app .btn-install svg { width: 14px; height: 14px; }
#kasir-app .btn-install:hover { background: var(--primary-dark); }

/* ---------- Main / pages ---------- */
#kasir-app .main { flex: 1; min-height: 0; display: flex; flex-direction: column; background: var(--paper); }
#kasir-app .page { display: none; flex: 1; min-height: 0; width: 100%; }
#kasir-app .page.active { display: flex; }
#kasir-app .page-inner { flex: 1; overflow-y: auto; padding: 16px 18px; width: 100%; -webkit-overflow-scrolling: touch; }

/* ---------- Bottom nav ---------- */
#kasir-app .bottom-nav {
  flex: none; display: flex; align-items: stretch; justify-content: center;
  background: var(--primary-dark); border-top: 1px solid rgba(255,255,255,0.08);
  padding: 0 6px env(safe-area-inset-bottom, 0);
  height: var(--nav-h); position: relative; z-index: 30;
}
#kasir-app .nav-btn {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
  flex: 1; max-width: 130px; border: none; background: transparent; color: rgba(234,243,238,0.62);
  font-size: 10.5px; font-weight: 600; border-radius: 10px; margin: 7px 3px; position: relative;
  transition: color .15s;
}
#kasir-app .nav-btn svg { width: 19px; height: 19px; }
#kasir-app .nav-btn:hover { color: rgba(255,255,255,0.9); }
#kasir-app .nav-btn.active { color: #6FD3A3; }
#kasir-app .nav-badge {
  position: absolute; top: 2px; right: 22%; background: var(--danger); color: #fff; font-size: 9px;
  font-weight: 700; min-width: 15px; height: 15px; border-radius: 999px; display: flex; align-items: center; justify-content: center; padding: 0 3px;
}

/* ---------- Buttons / inputs ---------- */
#kasir-app .btn {
  padding: 9px 15px; border-radius: 8px; border: 1px solid var(--border-strong);
  background: var(--panel); font-size: 13px; font-weight: 600; color: var(--ink);
  display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: all .12s;
}
#kasir-app .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
#kasir-app .btn:hover { border-color: var(--primary); color: var(--primary); }
#kasir-app .btn-primary { background: var(--primary); border-color: var(--primary); color: #fff; }
#kasir-app .btn-primary:hover { background: var(--primary-dark); color: #fff; }
#kasir-app .btn-primary:disabled { background: #B9C7BE; border-color: #B9C7BE; cursor: not-allowed; }
#kasir-app .btn-danger { color: var(--danger); border-color: var(--danger-soft); }
#kasir-app .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }
#kasir-app .btn-ghost { border-color: transparent; background: transparent; }
#kasir-app .btn-block { width: 100%; padding: 12px; font-size: 14px; }
#kasir-app .btn-outline-blue { color: var(--blue); border-color: var(--blue-soft); background: var(--blue-soft); }
#kasir-app .btn-outline-blue:hover { border-color: var(--blue); }
#kasir-app input, #kasir-app select, #kasir-app textarea {
  font-family: inherit; font-size: 16px; padding: 10px 11px; border-radius: 7px;
  border: 1px solid var(--border-strong); background: var(--panel); color: var(--ink); width: 100%;
}
#kasir-app input:focus, #kasir-app select:focus, #kasir-app textarea:focus { outline: 2px solid var(--primary); outline-offset: 0; border-color: var(--primary); }
#kasir-app label { font-size: 11.5px; font-weight: 600; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .04em; display: block; margin-bottom: 5px; }
#kasir-app .field { margin-bottom: 13px; }

/* ---------- Kasir page ---------- */
#kasir-app .kasir-grid { display: flex; flex: 1; min-height: 0; width: 100%; position: relative; }
#kasir-app .product-col { flex: 1.4; padding: 14px 16px 16px 16px; overflow-y: auto; min-width: 0; -webkit-overflow-scrolling: touch; }
#kasir-app .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
#kasir-app .cat-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; overflow-x: auto; }
#kasir-app .chip { padding: 6px 13px; border-radius: 999px; background: var(--panel); border: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--ink-soft); white-space: nowrap; }
#kasir-app .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
#kasir-app .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 10px; }
#kasir-app .prod-card {
  background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px;
  cursor: pointer; text-align: left; transition: transform .1s, box-shadow .1s; position: relative;
}
#kasir-app .prod-card:hover { box-shadow: var(--shadow); transform: translateY(-1px); border-color: var(--primary); }
#kasir-app .prod-card:disabled { opacity: .45; cursor: not-allowed; }
#kasir-app .prod-card:disabled:hover { transform: none; box-shadow: none; border-color: var(--border); }
#kasir-app .prod-name { font-size: 13px; font-weight: 600; margin-bottom: 14px; line-height: 1.3; min-height: 34px; }
#kasir-app .prod-price { font-size: 13px; font-weight: 700; color: var(--primary); }
#kasir-app .prod-stock { font-size: 10.5px; color: var(--ink-soft); margin-top: 3px; }
#kasir-app .prod-stock.low { color: var(--danger); font-weight: 600; }

/* Receipt / cart panel */
#kasir-app .cart-col { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; padding: 14px 16px 14px 0; }
#kasir-app .sheet-handle { display: none; }
#kasir-app .sheet-close { display: none; }
#kasir-app .receipt { background: var(--panel); border: 1px solid var(--border); border-top: 3px solid var(--primary); border-radius: 10px 10px 0 0; flex: 1; display: flex; flex-direction: column; min-height: 0; box-shadow: var(--shadow); }
#kasir-app .receipt-head { padding: 14px 16px 10px 16px; border-bottom: 1px dashed var(--border-strong); display: flex; align-items: center; justify-content: space-between; }
#kasir-app .receipt-head h2 { font-family: 'Space Grotesk'; font-size: 15px; margin: 0 0 2px 0; }
#kasir-app .receipt-head .muted { font-size: 11px; color: var(--ink-soft); }
#kasir-app .cart-list { flex: 1; overflow-y: auto; padding: 6px 16px; -webkit-overflow-scrolling: touch; }
#kasir-app .cart-empty { text-align: center; color: var(--ink-soft); font-size: 12.5px; padding: 40px 10px; }
#kasir-app .cart-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid #F1EDE2; }
#kasir-app .cart-item .ci-name { flex: 1; min-width: 0; }
#kasir-app .cart-item .ci-name .n { font-size: 12.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#kasir-app .cart-item .ci-name .p { font-size: 10.5px; color: var(--ink-soft); }
#kasir-app .qty-ctl { display: flex; align-items: center; gap: 6px; }
#kasir-app .qty-ctl button { width: 24px; height: 24px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--panel); font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center; color: var(--ink-soft); }
#kasir-app .qty-ctl button:hover { border-color: var(--primary); color: var(--primary); }
#kasir-app .qty-ctl .q { font-size: 12.5px; width: 18px; text-align: center; font-weight: 600; }
#kasir-app .ci-sub { font-size: 12px; font-weight: 700; width: 64px; text-align: right; }
#kasir-app .ci-del { color: var(--danger); opacity: .6; padding: 4px; }
#kasir-app .ci-del:hover { opacity: 1; }

#kasir-app .receipt-edge { height: 9px; background-image:
  linear-gradient(45deg, transparent 33.4%, var(--paper) 33.4%, var(--paper) 66.6%, transparent 66.6%),
  linear-gradient(-45deg, transparent 33.4%, var(--paper) 33.4%, var(--paper) 66.6%, transparent 66.6%);
  background-size: 14px 18px; background-color: var(--panel); flex-shrink: 0; }

#kasir-app .cart-summary { padding: 14px 16px 16px 16px; background: var(--panel); border-radius: 0 0 10px 10px; box-shadow: var(--shadow); }
#kasir-app .sum-row { display: flex; justify-content: space-between; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 5px; }
#kasir-app .sum-total { display: flex; justify-content: space-between; align-items: baseline; padding-top: 8px; margin-top: 6px; border-top: 1px dashed var(--border-strong); }
#kasir-app .sum-total .lbl { font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
#kasir-app .sum-total .val { font-family: 'Space Grotesk'; font-size: 22px; font-weight: 700; color: var(--primary-dark); }

/* Mobile mini cart bar */
#kasir-app .mini-cart-bar {
  display: none; align-items: center; gap: 10px; position: absolute; left: 12px; right: 12px; bottom: 14px;
  background: var(--primary-dark); color: #fff; border-radius: 12px; padding: 11px 14px; box-shadow: 0 8px 24px rgba(10,78,56,0.35);
  z-index: 25; border: none; text-align: left;
}
#kasir-app .mini-cart-bar .mc-count { background: rgba(255,255,255,0.18); border-radius: 999px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
#kasir-app .mini-cart-bar .mc-info { flex: 1; min-width: 0; }
#kasir-app .mini-cart-bar .mc-total { font-family: 'Space Grotesk'; font-size: 14px; font-weight: 700; }
#kasir-app .mini-cart-bar .mc-label { font-size: 10.5px; opacity: .8; }
#kasir-app .mini-cart-bar .mc-arrow { font-size: 15px; opacity: .8; }
#kasir-app .cart-backdrop { display: none; position: absolute; inset: 0; background: rgba(32,40,31,0.4); z-index: 24; }

/* ---------- Modal ---------- */
#kasir-app .modal-overlay { position: absolute; inset: 0; background: rgba(32,40,31,0.45); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 16px; }
#kasir-app .modal { background: var(--panel); border-radius: 12px; width: 100%; max-width: 380px; max-height: 90%; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
#kasir-app .modal.wide { max-width: 460px; }
#kasir-app .modal-head { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel); z-index: 2; }
#kasir-app .modal-head h3 { font-family: 'Space Grotesk'; font-size: 16px; margin: 0; }
#kasir-app .modal-close { background: none; border: none; font-size: 18px; color: var(--ink-soft); line-height: 1; padding: 4px; }
#kasir-app .modal-body { padding: 18px; }
#kasir-app .modal-foot { padding: 14px 18px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; position: sticky; bottom: 0; background: var(--panel); }

#kasir-app .pay-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
#kasir-app .pay-tab { flex: 1; padding: 10px 6px; border-radius: 8px; border: 1px solid var(--border-strong); background: var(--panel); text-align: center; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); }
#kasir-app .pay-tab.active { border-color: var(--primary); background: var(--primary-soft); color: var(--primary-dark); }
#kasir-app .big-total { text-align: center; padding: 10px 0 18px 0; }
#kasir-app .big-total .lbl { font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .05em; }
#kasir-app .big-total .val { font-family: 'Space Grotesk'; font-size: 30px; font-weight: 700; color: var(--ink); }
#kasir-app .quick-cash { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; margin-top: 8px; margin-bottom: 14px; }
#kasir-app .quick-cash button { padding: 9px 4px; border-radius: 7px; border: 1px solid var(--border-strong); background: var(--panel); font-size: 12px; font-weight: 600; color: var(--ink-soft); }
#kasir-app .quick-cash button:hover { border-color: var(--amber); color: var(--amber); }
#kasir-app .change-box { margin-top: 12px; padding: 12px; border-radius: 8px; background: var(--amber-soft); display: flex; justify-content: space-between; align-items: center; }
#kasir-app .change-box.neg { background: var(--danger-soft); }
#kasir-app .change-box .lbl { font-size: 12px; font-weight: 600; color: var(--ink-soft); }
#kasir-app .change-box .val { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 700; color: var(--amber); }
#kasir-app .change-box.neg .val { color: var(--danger); }
#kasir-app .qris-box { text-align: center; padding: 6px 0 4px 0; }
#kasir-app .qris-box img { width: 190px; height: 190px; object-fit: contain; border: 1px solid var(--border); border-radius: 10px; padding: 8px; background: #fff; }
#kasir-app .qris-empty { padding: 30px 16px; border: 1px dashed var(--border-strong); border-radius: 10px; color: var(--ink-soft); font-size: 12.5px; }
#kasir-app .transfer-box { padding: 14px; background: var(--blue-soft); border-radius: 8px; font-size: 13px; line-height: 1.7; }
#kasir-app .transfer-box b { color: var(--blue); }
#kasir-app .success-check { width: 56px; height: 56px; border-radius: 50%; background: var(--primary-soft); color: var(--primary); display: flex; align-items: center; justify-content: center; margin: 6px auto 14px auto; }
#kasir-app .success-check svg { width: 28px; height: 28px; }
#kasir-app .post-actions { display: flex; gap: 8px; margin-bottom: 8px; }
#kasir-app .post-actions .btn { flex: 1; font-size: 12px; padding: 10px 6px; }

/* ---------- Produk page ---------- */
#kasir-app .row-between { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
#kasir-app table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
#kasir-app th { text-align: left; font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-soft); background: #F4F0E5; padding: 10px 14px; font-weight: 700; }
#kasir-app td { padding: 11px 14px; font-size: 13px; border-top: 1px solid var(--border); }
#kasir-app tr:hover td { background: #FBFAF5; }
#kasir-app .pill { padding: 2px 9px; border-radius: 999px; font-size: 10.5px; font-weight: 700; background: var(--primary-soft); color: var(--primary-dark); display: inline-block; }
#kasir-app .pill.low { background: var(--danger-soft); color: var(--danger); }
#kasir-app .icon-btn { padding: 6px 8px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--ink-soft); }
#kasir-app .icon-btn:hover { background: var(--border); color: var(--ink); }
#kasir-app .icon-btn.danger:hover { background: var(--danger-soft); color: var(--danger); }
#kasir-app .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-soft); }
#kasir-app .empty-state svg { width: 40px; height: 40px; margin-bottom: 10px; opacity: .5; }
#kasir-app .produk-cards { display: none; }
#kasir-app .produk-card-item { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
#kasir-app .produk-card-item .pc-info { flex: 1; min-width: 0; }
#kasir-app .produk-card-item .pc-name { font-weight: 600; font-size: 13.5px; }
#kasir-app .produk-card-item .pc-meta { font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; }
#kasir-app .produk-card-item .pc-price { font-weight: 700; font-size: 13px; color: var(--primary-dark); margin-top: 3px; }
#kasir-app .produk-card-item .pc-actions { display: flex; gap: 4px; flex-shrink: 0; }

/* ---------- Riwayat page ---------- */
#kasir-app .summary-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
#kasir-app .s-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; }
#kasir-app .s-card .lbl { font-size: 10.5px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
#kasir-app .s-card .val { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 700; }
#kasir-app .filter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
#kasir-app .filter-row input[type=date] { width: auto; }
#kasir-app .trx-item { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; margin-bottom: 8px; overflow: hidden; }
#kasir-app .trx-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; flex-wrap: wrap; }
#kasir-app .trx-head .id { font-family: 'IBM Plex Mono'; font-size: 11px; color: var(--ink-soft); }
#kasir-app .trx-head .time { font-size: 11.5px; color: var(--ink-soft); }
#kasir-app .trx-head .method { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
#kasir-app .method.tunai { background: var(--amber-soft); color: var(--amber); }
#kasir-app .method.qris { background: var(--blue-soft); color: var(--blue); }
#kasir-app .method.transfer { background: var(--primary-soft); color: var(--primary-dark); }
#kasir-app .trx-head .total { margin-left: auto; font-weight: 700; font-size: 13.5px; }
#kasir-app .trx-detail { padding: 0 14px 12px 14px; border-top: 1px dashed var(--border); font-size: 12px; display: none; }
#kasir-app .trx-detail .di { display: flex; justify-content: space-between; padding: 5px 0; color: var(--ink-soft); }
#kasir-app .trx-detail .post-actions { margin-top: 8px; }

/* ---------- Pengaturan page ---------- */
#kasir-app .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 720px; }
#kasir-app .settings-home { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; max-width: 720px; }
#kasir-app .settings-card { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-radius: 16px; border: 1px solid var(--border); background: var(--panel); color: var(--ink); font-weight: 700; width: 100%; cursor: pointer; }
#kasir-app .settings-card:hover { border-color: var(--primary); }
#kasir-app .settings-subpage { display: none; }
#kasir-app .settings-subpage.active { display: block; }
#kasir-app .settings-back { margin-bottom: 16px; border: none; background: transparent; color: var(--primary); font-weight: 700; cursor: pointer; }
#kasir-app .settings-back:hover { text-decoration: underline; }
#kasir-app .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
#kasir-app .card h4 { font-family: 'Space Grotesk'; font-size: 14px; margin: 0 0 12px 0; }
#kasir-app .inline-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
#kasir-app .promo-list, #kasir-app .member-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
#kasir-app .promo-item, #kasir-app .member-item { background: var(--paper); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 12px; }
#kasir-app .promo-item strong, #kasir-app .member-item strong { display: block; font-size: 12.5px; margin-bottom: 2px; }
#kasir-app .mini-muted { font-size: 11px; color: var(--ink-soft); margin-top: 2px; }
#kasir-app .upload-zone { border: 1.5px dashed var(--border-strong); border-radius: 9px; padding: 16px; text-align: center; cursor: pointer; }
#kasir-app .upload-zone:hover { border-color: var(--primary); background: var(--primary-soft); }
#kasir-app .upload-zone img { width: 130px; height: 130px; object-fit: contain; margin-bottom: 8px; }
#kasir-app .toast { position: absolute; bottom: calc(var(--nav-h) + 14px); left: 50%; transform: translateX(-50%); background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 12.5px; font-weight: 600; z-index: 100; box-shadow: 0 6px 20px rgba(0,0,0,0.25); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; max-width: 88%; text-align: center; }
#kasir-app .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

/* ---------- Mobile responsive ---------- */
@media (min-width: 720px){
  #kasir-app .clock { display: block; }
}
@media (max-width: 860px){
  #kasir-app .kasir-grid { position: relative; overflow: hidden; }
  #kasir-app .product-col { padding-bottom: 84px; width: 100%; }
  #kasir-app .cart-col {
    position: absolute; left: 0; right: 0; bottom: 0; width: 100%;
    padding: 8px 12px calc(14px + env(safe-area-inset-bottom,0)) 12px;
    background: var(--paper); border-radius: 16px 16px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.18);
    max-height: 78%; transform: translateY(105%); transition: transform .28s cubic-bezier(.32,.72,0,1); z-index: 26;
  }
  #kasir-app .cart-col.sheet-open { transform: translateY(0); }
  #kasir-app .sheet-handle { display: block; width: 38px; height: 4px; border-radius: 999px; background: var(--border-strong); margin: 4px auto 8px auto; }
  #kasir-app .sheet-close { display: flex; align-items: center; justify-content: center; position: absolute; top: 10px; right: 10px; width: 26px; height: 26px; border-radius: 50%; background: var(--panel); border: 1px solid var(--border); color: var(--ink-soft); font-size: 13px; z-index: 2; }
  #kasir-app .receipt { border-radius: 8px 8px 0 0; }
  #kasir-app .cart-summary { border-radius: 0 0 8px 8px; }
  #kasir-app .cart-backdrop.show { display: block; }
  #kasir-app .mini-cart-bar.show { display: flex; }

  #kasir-app .topbar h1 { font-size: 15.5px; }
  #kasir-app .topbar .sub { display: none; }
  #kasir-app .summary-cards { grid-template-columns: repeat(2,1fr); }
  #kasir-app .settings-grid { grid-template-columns: 1fr; }
  #kasir-app table { display: none; }
  #kasir-app .produk-cards { display: block; }
  #kasir-app .trx-head { font-size: 11.5px; }
  #kasir-app .trx-head .time { width: auto; }
  #kasir-app .modal-overlay { align-items: flex-end; padding: 0; }
  #kasir-app .modal { max-width: 100%; border-radius: 16px 16px 0 0; max-height: 92%; }
  #kasir-app .prod-grid { grid-template-columns: repeat(auto-fill, minmax(104px,1fr)); }
}
@media (max-width: 420px){
  #kasir-app .nav-btn { font-size: 9.5px; }
  #kasir-app .summary-cards { grid-template-columns: 1fr 1fr; }
}

@media print {
  #kasir-app > *:not(#printArea) { display: none !important; }
  #printArea {
    display: block !important; position: absolute; top: 0; left: 0; width: 100%;
    font-family: 'IBM Plex Mono', monospace; color: #000; padding: 6mm;
  }
  #printArea .pr-shop { text-align: center; font-weight: 700; font-size: 13px; margin-bottom: 2px; }
  #printArea .pr-note, #printArea .pr-date { text-align: center; font-size: 10px; margin-bottom: 2px; }
  #printArea hr { border: none; border-top: 1px dashed #000; margin: 6px 0; }
  #printArea .pr-row { display: flex; justify-content: space-between; font-size: 11px; margin: 2px 0; }
  #printArea .pr-total { font-weight: 700; font-size: 12.5px; }
}
</style>

<style>
.pwa-splash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:var(--primary);color:#fff;z-index:9999;transition:opacity .45s,transform .45s;will-change:opacity,transform}
.pwa-splash .logo-wrap{width:140px;height:140px;border-radius:20px;background:#fff;padding:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 36px rgba(0,0,0,0.14);animation:logo-pulse 1200ms ease-in-out infinite}
.pwa-splash .logo-wrap img{width:100%;height:100%;display:block}
.pwa-splash-title{font-size:20px;font-weight:700;margin-top:12px;color:#fff;animation:title-float 1400ms ease-in-out infinite}
.pwa-splash.hide{opacity:0;pointer-events:none;transform:translateY(-10px)}
@keyframes logo-pulse{0%{transform:scale(.96) rotate(0deg)}50%{transform:scale(1.06) rotate(6deg)}100%{transform:scale(.96) rotate(0deg)}}
@keyframes title-float{0%{transform:translateY(0);opacity:.92}50%{transform:translateY(-6px);opacity:1}100%{transform:translateY(0);opacity:.92}}

/* Splash loader (three dots) */
.splash-loader{display:flex;gap:8px;margin-top:12px}
.splash-loader .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.9);opacity:.25;transform:translateY(0);animation:dot-bounce 1s infinite ease-in-out}
.splash-loader .dot:nth-child(1){animation-delay:0s}
.splash-loader .dot:nth-child(2){animation-delay:0.15s}
.splash-loader .dot:nth-child(3){animation-delay:0.3s}
@keyframes dot-bounce{0%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-8px)}100%{opacity:.25;transform:translateY(0)}}
</style>
